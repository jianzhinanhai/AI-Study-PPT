<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#103b36"><title>正在载入行程…</title><style>body{margin:0;display:grid;place-items:center;min-height:100vh;background:#0b2c29;color:#fff;font-family:"PingFang SC","Microsoft YaHei",sans-serif}.box{text-align:center;padding:30px}.dot{width:36px;height:36px;border:3px solid rgba(255,255,255,.25);border-top-color:#d8b56f;border-radius:50%;margin:0 auto 18px;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}p{color:rgba(255,255,255,.7);font-size:13px}</style></head><body><div class="box"><div class="dot"></div><strong>正在载入旅行行程</strong><p>首次打开需要加载页面图片，请稍候。</p></div><script>
const pageParts=["parts/page-01.txt", "parts/page-02.txt", "parts/page-03.txt"];
const imageDataParts=["image-data/images-01.txt", "image-data/images-02.txt", "image-data/images-03.txt", "image-data/images-04.txt", "image-data/images-05.txt", "image-data/images-06.txt", "image-data/images-07.txt", "image-data/images-08.txt", "image-data/images-09.txt", "image-data/images-10.txt", "image-data/images-11.txt", "image-data/images-12.txt"];
async function getText(urls){const r=await Promise.all(urls.map(u=>fetch(u).then(x=>{if(!x.ok)throw new Error(u);return x.text()})));return r.join('')}
(async()=>{try{let html=await getText(pageParts);const raw=await getText(imageDataParts);const re=/@@(\d{2})@@\s*([\s\S]*?)(?=@@\d{2}@@|$)/g;let m;while((m=re.exec(raw))){const key='__IMG_'+m[1]+'__';const data=m[2].replace(/\s+/g,'');html=html.split(key).join('data:image/webp;base64,'+data)}document.open();document.write(html);document.close();}catch(e){document.body.innerHTML='<div class="box"><strong>页面加载失败</strong><p>请刷新页面或检查网络连接。</p></div>';console.error(e)}})();
</script></body></html>
