<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#103b36"><title>正在载入行程…</title><style>body{margin:0;display:grid;place-items:center;min-height:100vh;background:#0b2c29;color:#fff;font-family:"PingFang SC","Microsoft YaHei",sans-serif}.box{text-align:center;padding:30px}.dot{width:36px;height:36px;border:3px solid rgba(255,255,255,.25);border-top-color:#d8b56f;border-radius:50%;margin:0 auto 18px;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}p{color:rgba(255,255,255,.7);font-size:13px}</style></head><body><div class="box"><div class="dot"></div><strong>正在载入旅行行程</strong><p>首次打开需要加载页面图片，请稍候。</p></div><script>
const pageParts=["parts/page-01.txt", "parts/page-02.txt", "parts/page-03.txt"];
const imageParts={"__IMG_01__": ["assets-data/image-01-01.txt", "assets-data/image-01-02.txt", "assets-data/image-01-03.txt"], "__IMG_02__": ["assets-data/image-02-01.txt", "assets-data/image-02-02.txt", "assets-data/image-02-03.txt", "assets-data/image-02-04.txt"], "__IMG_03__": ["assets-data/image-03-01.txt"], "__IMG_04__": ["assets-data/image-04-01.txt"], "__IMG_05__": ["assets-data/image-05-01.txt"], "__IMG_06__": ["assets-data/image-06-01.txt"], "__IMG_07__": ["assets-data/image-07-01.txt", "assets-data/image-07-02.txt"], "__IMG_08__": ["assets-data/image-08-01.txt", "assets-data/image-08-02.txt"], "__IMG_09__": ["assets-data/image-09-01.txt", "assets-data/image-09-02.txt"], "__IMG_10__": ["assets-data/image-10-01.txt", "assets-data/image-10-02.txt"], "__IMG_11__": ["assets-data/image-11-01.txt", "assets-data/image-11-02.txt"]};
async function getText(urls){const r=await Promise.all(urls.map(u=>fetch(u).then(x=>{if(!x.ok)throw new Error(u);return x.text()})));return r.join('')}
(async()=>{try{let html=await getText(pageParts);const entries=await Promise.all(Object.entries(imageParts).map(async([key,files])=>{const svg=await getText(files);return [key,URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}))]}));for(const [key,url] of entries)html=html.split(key).join(url);document.open();document.write(html);document.close();}catch(e){document.body.innerHTML='<div class="box"><strong>页面加载失败</strong><p>请刷新页面或检查网络连接。</p></div>';console.error(e)}})();
</script></body></html>
