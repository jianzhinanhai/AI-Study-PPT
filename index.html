<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#103b36">
<title>Travel Itineraries｜旅行行程库</title>
<meta name="description" content="家庭旅行与定制行程HTML合集">
<style>
:root{--deep:#103b36;--cream:#f6f2ea;--paper:#fffdf9;--ink:#172522;--gold:#b98a46;--muted:#687570}
*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif}
.hero{padding:84px 22px 60px;background:linear-gradient(135deg,#082824,#174d45);color:#fff}
.wrap{max-width:1080px;margin:auto}.eyebrow{font-size:12px;letter-spacing:.22em;color:#d8b56f;font-weight:700}
h1{font-family:"Songti SC","STSong",serif;font-size:48px;line-height:1.12;margin:18px 0 12px}
.hero p{max-width:690px;color:rgba(255,255,255,.72);line-height:1.8}
main{padding:50px 22px 80px}.section-title{font-size:13px;color:var(--muted);letter-spacing:.14em;margin-bottom:18px}
.card{display:grid;grid-template-columns:1.1fr .9fr;background:var(--paper);box-shadow:0 18px 50px rgba(20,55,49,.12);overflow:hidden}
.photo{min-height:350px;background:linear-gradient(0deg,rgba(6,31,28,.62),rgba(6,31,28,.10)),linear-gradient(135deg,#235c54,#0c312d)}
.copy{padding:42px}.tag{font-size:11px;letter-spacing:.16em;color:var(--gold);font-weight:700}
h2{font-family:"Songti SC","STSong",serif;font-size:34px;margin:12px 0}
.meta{display:flex;flex-wrap:wrap;gap:8px;margin:20px 0}.pill{padding:7px 11px;border-radius:99px;background:#e9f0eb;color:var(--deep);font-size:12px}
.desc{color:var(--muted);line-height:1.8;font-size:14px}
.btn{display:inline-block;margin-top:20px;text-decoration:none;background:var(--deep);color:#fff;padding:13px 19px;border-radius:999px;font-weight:700;font-size:13px}
.footer{padding:30px 22px;color:var(--muted);font-size:11px;text-align:center}
@media(max-width:720px){h1{font-size:38px}.card{grid-template-columns:1fr}.photo{min-height:230px}.copy{padding:28px 22px}h2{font-size:29px}}
</style>
</head>
<body>
<section class="hero"><div class="wrap">
<div class="eyebrow">TRAVEL ITINERARY LIBRARY</div>
<h1>旅行行程库</h1>
<p>用于集中保存、更新和对外分享家庭旅行及定制行程。每份行程均为独立HTML页面，可在手机和电脑浏览。</p>
</div></section>
<main><div class="wrap">
<div class="section-title">PUBLISHED ITINERARIES</div>
<article class="card">
<div class="photo"></div>
<div class="copy">
<div class="tag">MALAYSIA · 2026</div>
<h2>南洋双城家庭私享之旅</h2>
<div class="meta"><span class="pill">吉隆坡 × 槟城</span><span class="pill">6天5晚</span><span class="pill">一家三口</span></div>
<p class="desc">包含逐日行程、航班衔接、核心景点图文介绍、分城市费用清单以及可编辑预算测算器。</p>
<a class="btn" href="trips/malaysia-kl-penang-2026/">打开行程表</a>
</div>
</article>
</div></main>
<footer class="footer">Travel Itineraries · GitHub Pages</footer>
</body></html>
